apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: terraformers-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/siamese-lang/Terraformers-modernization.git
    targetRevision: agent/rdb-domain-realignment
    path: infra/kubernetes/gitops/backend-runtime
  destination:
    server: https://kubernetes.default.svc
    namespace: terraformers-runtime
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ApplyOutOfSyncOnly=true
