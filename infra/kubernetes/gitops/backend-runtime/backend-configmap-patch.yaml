apiVersion: v1
kind: ConfigMap
metadata:
  name: terraformers-backend-runtime-config
data:
  SPRING_PROFILES_ACTIVE: "prod"
  AWS_REGION: "ap-northeast-2"
  DEPLOYMENT_ENVIRONMENT: "dev"

  # Production image analysis reads private S3 objects and invokes the configured Bedrock models.
  # OPENSEARCH_ENDPOINT is supplied through the private runtime Secret from the rag-runtime output.
  S3_READER_ENABLED: "true"
  S3_WRITER_ENABLED: "true"
  BEDROCK_PROVIDER_ENABLED: "true"
  BEDROCK_MODEL_ID: "global.anthropic.claude-sonnet-4-6"
  RETRIEVAL_MODE: "REQUIRED"
  BEDROCK_EMBEDDING_MODEL_ID: "amazon.titan-embed-text-v2:0"
  INDEX_NAME: "terraformers-reference-v1"
  VECTOR_FIELD_NAME: "embedding"
  CONTENT_FIELD_NAME: "content"
  CORPUS_VERSION: "terraformers-reference-v2"
  PROVIDER_VERSION: "5.100.0"
  EXPECTED_VECTOR_DIMENSION: "1024"
  ANALYSIS_SQS_PUBLISHER_ENABLED: "false"

  BEDROCK_MAX_TOKENS: "8192"
  OPENSEARCH_SERVICE_NAME: "aoss"
  OPENSEARCH_TOP_K: "8"
  ANALYSIS_RESULT_KEY_PREFIX: "analysis-results"
