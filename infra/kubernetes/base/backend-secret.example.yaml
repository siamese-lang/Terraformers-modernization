apiVersion: v1
kind: Secret
metadata:
  name: terraformers-backend-runtime-secrets
  labels:
    app.kubernetes.io/name: terraformers-backend
    app.kubernetes.io/part-of: terraformers-modernization
type: Opaque
stringData:
  # Database runtime contract.
  # Replace these placeholders through External Secrets, Sealed Secrets, or CI/CD environment injection.
  SPRING_DATASOURCE_URL: "jdbc:mariadb://example-rds.cluster-xxxxxxxx.ap-northeast-2.rds.amazonaws.com:3306/terraformers"
  SPRING_DATASOURCE_USERNAME: "replace-me"
  SPRING_DATASOURCE_PASSWORD: "replace-me"

  # Cognito runtime contract.
  COGNITO_REGION: "ap-northeast-2"
  COGNITO_USER_POOL_ID: "ap-northeast-2_example"
  COGNITO_USER_POOL_CLIENT_ID: "replace-me"
  COGNITO_JWKS_URL: "https://cognito-idp.ap-northeast-2.amazonaws.com/ap-northeast-2_example/.well-known/jwks.json"

  # Object storage runtime contract.
  S3_BUCKET_NAME: "terraformers-upload-bucket-example"
  ANALYSIS_RESULT_BUCKET_NAME: "terraformers-result-bucket-example"

  # Queue runtime contract.
  AI_LOG_QUEUE_URL: "https://sqs.ap-northeast-2.amazonaws.com/123456789012/terraformers-ai-log"
  TERRAFORM_LOG_QUEUE_URL: "https://sqs.ap-northeast-2.amazonaws.com/123456789012/terraformers-terraform-log"

  # Bedrock/OpenSearch runtime contract.
  BEDROCK_MODEL_ID: "anthropic.claude-3-5-sonnet-20240620-v1:0"
  BEDROCK_EMBEDDING_MODEL_ID: "amazon.titan-embed-text-v2:0"
  OPENSEARCH_ENDPOINT: "https://example.aoss.ap-northeast-2.amazonaws.com"
  INDEX_NAME: "terraformers-reference-patterns"
  VECTOR_FIELD_NAME: "embedding"
  CONTENT_FIELD_NAME: "content"
