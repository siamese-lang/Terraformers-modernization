apiVersion: v1
kind: Secret
metadata:
  name: terraformers-backend-runtime-secrets
  labels:
    app.kubernetes.io/name: terraformers-backend
    app.kubernetes.io/part-of: terraformers-modernization
type: Opaque
stringData:
  # Example shape only. Do not apply this file as-is.
  # Replace placeholders through External Secrets, Sealed Secrets, or CI/CD environment injection.

  # Database runtime contract.
  SPRING_DATASOURCE_URL: "<jdbc-datasource-url>"
  SPRING_DATASOURCE_USERNAME: "<datasource-username>"
  SPRING_DATASOURCE_PASSWORD: "<datasource-password>"

  # Cognito runtime contract.
  COGNITO_REGION: "<aws-region>"
  COGNITO_USER_POOL_ID: "<cognito-user-pool-id>"
  COGNITO_USER_POOL_CLIENT_ID: "<cognito-user-pool-client-id>"
  COGNITO_JWKS_URL: "<cognito-jwks-url>"

  # Object storage runtime contract.
  S3_BUCKET_NAME: "<upload-bucket-name>"
  ANALYSIS_RESULT_BUCKET_NAME: "<result-bucket-name>"

  # Queue runtime contract.
  AI_LOG_QUEUE_URL: "<ai-log-queue-url>"
  TERRAFORM_LOG_QUEUE_URL: "<terraform-log-queue-url>"

  # Bedrock/OpenSearch runtime contract.
  BEDROCK_MODEL_ID: "<bedrock-vision-model-id>"
  BEDROCK_EMBEDDING_MODEL_ID: "<bedrock-embedding-model-id>"
  OPENSEARCH_ENDPOINT: "<opensearch-or-aoss-endpoint>"
  INDEX_NAME: "<reference-index-name>"
  VECTOR_FIELD_NAME: "<vector-field-name>"
  CONTENT_FIELD_NAME: "<content-field-name>"
