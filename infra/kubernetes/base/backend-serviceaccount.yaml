apiVersion: v1
kind: ServiceAccount
metadata:
  name: terraformers-backend
  labels:
    app.kubernetes.io/name: terraformers-backend
    app.kubernetes.io/part-of: terraformers-modernization
  annotations:
    # Replace with the IAM role created for backend runtime access.
    # eks.amazonaws.com/role-arn: arn:aws:iam::<account-id>:role/terraformers-backend-runtime-role
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/terraformers-backend-runtime-role-example"
