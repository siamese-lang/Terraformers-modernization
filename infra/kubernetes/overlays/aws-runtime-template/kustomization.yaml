apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: terraformers-runtime

resources:
  - ../../base

images:
  - name: public.ecr.aws/example/terraformers-backend
    newName: registry.example.com/terraformers-backend
    newTag: immutable-tag

patches:
  - path: backend-configmap-patch.yaml
  - path: backend-deployment-patch.yaml

# This overlay is a public-safe runtime template.
# Before applying to a real cluster, copy it to an environment-specific overlay and replace:
# - namespace
# - image newName/newTag
# - runtime Secret provider
# - ServiceAccount IRSA annotation
# - adapter switches, one adapter at a time
