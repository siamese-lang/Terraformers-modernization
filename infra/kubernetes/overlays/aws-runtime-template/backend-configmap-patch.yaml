apiVersion: v1
kind: ConfigMap
metadata:
  name: terraformers-backend-runtime-config
data:
  SPRING_PROFILES_ACTIVE: "prod"
  AWS_REGION: "ap-northeast-2"

  # Production image analysis reads private S3 objects and invokes the configured Bedrock vision model.
  # BEDROCK_MODEL_ID is supplied from the runtime Secret; IRSA model ARNs remain conditional in Terraform.
  S3_READER_ENABLED: "true"
  S3_WRITER_ENABLED: "true"
  BEDROCK_PROVIDER_ENABLED: "true"
  BEDROCK_EMBEDDING_ENABLED: "false"
  OPENSEARCH_RETRIEVER_ENABLED: "false"
  ANALYSIS_SQS_PUBLISHER_ENABLED: "false"

  BEDROCK_MAX_TOKENS: "4096"
  OPENSEARCH_SERVICE_NAME: "aoss"
  OPENSEARCH_TOP_K: "3"
  ANALYSIS_RESULT_KEY_PREFIX: "analysis-results"
