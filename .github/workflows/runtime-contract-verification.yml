name: Runtime Contract Verification

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-contract-verification:
    name: Runtime contract baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: v1.30.5

      - name: Verify runtime contract
        run: bash scripts/checks/runtime-contract-verification.sh

      - name: Verify AWS environment contract
        run: bash scripts/checks/aws-environment-contract-verification.sh

      - name: Inventory AWS deployment contract sources
        run: |
          python3 scripts/checks/aws-deployment-contract-inventory.py
          python3 scripts/checks/aws-workflow-reference-reconciliation.py

      - name: Verify AWS runtime input bundle contract
        run: bash scripts/checks/aws-runtime-input-bundle-contract-verification.sh

      - name: Verify managed Secret delivery contract
        run: bash scripts/checks/external-secrets-runtime-contract-verification.sh

      - name: Verify private backend origin contract
        run: bash scripts/checks/backend-origin-contract-verification.sh

      - name: Verify frontend delivery contract
        run: bash scripts/checks/frontend-delivery-contract-verification.sh

      - name: Upload AWS environment contract evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: aws-environment-contract-evidence
          if-no-files-found: warn
          path: |
            artifacts/aws-environment-contract
            artifacts/aws-runtime-input-bundle-contract
            artifacts/external-secrets-runtime-contract
            artifacts/backend-origin-contract
            artifacts/frontend-delivery-contract

      - name: Upload runtime contract diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: runtime-contract-verification-diagnostics
          path: |
            backend/target/surefire-reports
            backend/target/*.log

  predeployment-package-verification:
    name: Build images and dry-run deployment packages
    needs: runtime-contract-verification
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      REACT_APP_API_BASE_URL: ''
      REACT_APP_AWS_REGION: ap-northeast-2
      REACT_APP_COGNITO_USER_POOL_ID: ap-northeast-2_predeployment
      REACT_APP_COGNITO_USER_POOL_CLIENT_ID: predeployment-client-id

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: v1.30.5

      - name: Verify frontend, backend image, and Kubernetes packages
        run: bash scripts/checks/predeployment-package-verification.sh

      - name: Record frontend production build input evidence
        run: |
          set -euo pipefail
          test -z "${REACT_APP_API_BASE_URL}"
          grep -R -q 'ap-northeast-2_predeployment' frontend/build/static/js
          grep -R -q 'predeployment-client-id' frontend/build/static/js
          {
            echo 'frontend_api_base_mode=same-origin-relative'
            echo 'frontend_cognito_build_values=embedded'
            echo 'frontend_build_secret_count=0'
          } > artifacts/predeployment/frontend-production-build-input-summary.txt

      - name: Upload pre-deployment evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: predeployment-package-evidence
          if-no-files-found: warn
          path: artifacts/predeployment

  live-deployment-execution-plan:
    name: Generate live deployment execution plan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate execution plan contract
        run: |
          set -euo pipefail
          python3 scripts/deploy/build-live-deployment-execution-plan.py \
            --manifest config/live-deployment-stages.json \
            --output-dir artifacts/live-deployment-execution-plan

      - name: Upload execution plan evidence
        uses: actions/upload-artifact@v6
        with:
          name: live-deployment-execution-plan-evidence
          path: artifacts/live-deployment-execution-plan
          if-no-files-found: error
