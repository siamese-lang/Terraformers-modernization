name: Runtime Contract Verification

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-contract-verification:
    name: Runtime contract baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.5

      - name: Verify runtime contract
        run: bash scripts/checks/runtime-contract-verification.sh
