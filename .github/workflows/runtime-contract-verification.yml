name: Runtime Contract Verification

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-contract-verification:
    name: Runtime contract baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.5

      - name: Verify runtime contract
        run: bash scripts/checks/runtime-contract-verification.sh

      - name: Upload runtime contract diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-contract-verification-diagnostics
          path: |
            backend/target/surefire-reports
            backend/target/*.log

  predeployment-package-verification:
    name: Build images and dry-run deployment packages
    needs: runtime-contract-verification
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.5

      - name: Verify frontend, backend image, and Kubernetes packages
        run: bash scripts/checks/predeployment-package-verification.sh

      - name: Upload pre-deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: predeployment-package-evidence
          if-no-files-found: warn
          path: artifacts/predeployment
