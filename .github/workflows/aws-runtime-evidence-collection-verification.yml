name: AWS Runtime Evidence Collection Verification

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/aws-runtime-evidence-collection-verification.yml"
      - "scripts/checks/aws-runtime-evidence-collection-verification.sh"
      - "scripts/deploy/collect-aws-runtime-evidence.sh"
      - "scripts/deploy/aws-runtime-rollout-smoke.sh"
      - "docs/aws-runtime-evidence-collection.md"

permissions:
  contents: read

jobs:
  aws-runtime-evidence-collection:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify AWS runtime evidence collection path
        run: bash scripts/checks/aws-runtime-evidence-collection-verification.sh

      - name: Upload evidence collection artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aws-runtime-evidence-collection-verification
          path: artifacts/aws-runtime-evidence-collection-verification
          if-no-files-found: ignore
