name: RAG v2 Live Preparation
# One-time immutable image publication after the recorded corpus v2 ingestion succeeded.

on:
  push:
    branches:
      - agent/rag-corpus-version-scope
    paths:
      - .github/workflows/rag-v2-live-preparation.yml

permissions:
  contents: read
  id-token: write

jobs:
  verify-v2-ingestion:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout preparation branch
        uses: actions/checkout@v5
      - name: Verify recorded corpus v2 ingestion
        run: |
          set -euo pipefail
          RESULT=.github/rag-v2-live-preparation-result.txt
          grep -Fqx 'ingestion_result=success' "$RESULT"
          grep -Fqx 'corpus_version=terraformers-reference-v2' "$RESULT"
          grep -Fqx 'count=128' "$RESULT"
          grep -Fqx 'build_status=SUCCEEDED' "$RESULT"

  publish-backend:
    needs: verify-v2-ingestion
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: aws-backend-image-publish
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      EXPECTED_AWS_ACCOUNT_ID: ${{ vars.EXPECTED_AWS_ACCOUNT_ID }}
      BACKEND_ECR_REPOSITORY: ${{ vars.BACKEND_ECR_REPOSITORY || 'terraformers-backend' }}
      SOURCE_COMMIT_SHA: a672a322fcaa784baf19fa7bb0687fc403f0aff7

    steps:
      - name: Checkout instrumented backend source
        uses: actions/checkout@v5
        with:
          ref: ${{ env.SOURCE_COMMIT_SHA }}

      - name: Validate immutable publish inputs
        run: |
          set -euo pipefail
          test "$EXPECTED_AWS_ACCOUNT_ID" = '024863981627'
          test "$AWS_REGION" = 'ap-northeast-2'
          test -n "$AWS_ROLE_TO_ASSUME"
          [[ "$BACKEND_ECR_REPOSITORY" =~ ^[a-z0-9][a-z0-9._/-]*$ ]]
          IMAGE_TAG="git-${SOURCE_COMMIT_SHA}"
          IMAGE_URI="${EXPECTED_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${BACKEND_ECR_REPOSITORY}:${IMAGE_TAG}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"
          {
            echo "source_commit_sha=$SOURCE_COMMIT_SHA"
            echo "image_uri=$IMAGE_URI"
            echo "corpus_version=terraformers-reference-v2"
            echo "provider_version=5.100.0"
          } > backend-live-preparation-summary.txt

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: TerraformersRagV2BackendPublish
          aws-region: ${{ env.AWS_REGION }}
          allowed-account-ids: ${{ env.EXPECTED_AWS_ACCOUNT_ID }}

      - name: Verify immutable tag availability
        run: |
          set -euo pipefail
          test "$(aws sts get-caller-identity --query Account --output text)" = "$EXPECTED_AWS_ACCOUNT_ID"
          set +e
          VERIFY_OUTPUT="$(aws ecr describe-images \
            --region "$AWS_REGION" \
            --repository-name "$BACKEND_ECR_REPOSITORY" \
            --image-ids imageTag="$IMAGE_TAG" 2>&1)"
          VERIFY_STATUS=$?
          set -e
          if [[ $VERIFY_STATUS -eq 0 ]]; then
            echo 'image_verify=tag-already-exists' >> backend-live-preparation-summary.txt
            exit 1
          fi
          if grep -q 'ImageNotFoundException' <<<"$VERIFY_OUTPUT"; then
            echo 'image_verify=tag-available' >> backend-live-preparation-summary.txt
            exit 0
          fi
          if grep -q 'RepositoryNotFoundException' <<<"$VERIFY_OUTPUT"; then
            echo 'image_verify=repository-not-found' >> backend-live-preparation-summary.txt
          elif grep -q 'AccessDenied' <<<"$VERIFY_OUTPUT"; then
            echo 'image_verify=access-denied' >> backend-live-preparation-summary.txt
          else
            echo 'image_verify=unexpected-error' >> backend-live-preparation-summary.txt
          fi
          exit 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          set -euo pipefail
          docker build \
            --label "org.opencontainers.image.revision=${SOURCE_COMMIT_SHA}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            -f backend/Dockerfile \
            -t "$IMAGE_URI" \
            backend

      - name: Login and push immutable image
        run: |
          set -euo pipefail
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "${EXPECTED_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          docker push "$IMAGE_URI"
          IMAGE_DIGEST="$(aws ecr describe-images \
            --region "$AWS_REGION" \
            --repository-name "$BACKEND_ECR_REPOSITORY" \
            --image-ids imageTag="$IMAGE_TAG" \
            --query 'imageDetails[0].imageDigest' \
            --output text)"
          [[ "$IMAGE_DIGEST" == sha256:* ]]
          {
            echo "image_digest=$IMAGE_DIGEST"
            echo "pushed=true"
          } >> backend-live-preparation-summary.txt
          cat backend-live-preparation-summary.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload sanitized publish evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: rag-v2-backend-image-evidence
          path: backend-live-preparation-summary.txt
          if-no-files-found: error

  record-result:
    if: ${{ always() }}
    needs:
      - verify-v2-ingestion
      - publish-backend
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout preparation branch
        uses: actions/checkout@v5
        with:
          ref: agent/rag-corpus-version-scope
          fetch-depth: 0

      - name: Download image evidence when available
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/download-artifact@v6
        with:
          name: rag-v2-backend-image-evidence
          path: preparation-evidence/image

      - name: Record sanitized preparation result
        env:
          INGEST_VERIFY_RESULT: ${{ needs.verify-v2-ingestion.result }}
          PUBLISH_RESULT: ${{ needs.publish-backend.result }}
        run: |
          set -euo pipefail
          RESULT_FILE=.github/rag-v2-live-preparation-result.txt
          PREVIOUS_RESULT="$(mktemp)"
          cp "$RESULT_FILE" "$PREVIOUS_RESULT"
          {
            echo "workflow_run_id=${GITHUB_RUN_ID}"
            echo "workflow_commit_sha=${GITHUB_SHA}"
            echo "backend_source_commit_sha=a672a322fcaa784baf19fa7bb0687fc403f0aff7"
            echo "ingestion_result=$([[ "$INGEST_VERIFY_RESULT" == success ]] && echo success || echo failure)"
            echo "image_publish_result=${PUBLISH_RESULT}"
            grep -E '^(checksum|count|corpus_version|corpus_directory|build_id|build_status)=' "$PREVIOUS_RESULT" || true
            if [[ -f preparation-evidence/image/backend-live-preparation-summary.txt ]]; then
              cat preparation-evidence/image/backend-live-preparation-summary.txt
            fi
          } > "$RESULT_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$RESULT_FILE"
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Record RAG v2 live preparation result"
          git push origin HEAD:agent/rag-corpus-version-scope
