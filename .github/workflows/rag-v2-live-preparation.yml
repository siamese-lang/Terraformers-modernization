name: RAG v2 Live Preparation

on:
  push:
    branches:
      - agent/rag-corpus-version-scope
    paths:
      - .github/workflows/rag-v2-live-preparation.yml

permissions:
  contents: read
  id-token: write

jobs:
  ingest-v2:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/rag-corpus-ingestion.yml
    with:
      execute_ingestion: true
      corpus_directory: corpus/terraformers-reference/v2
      expected_aws_account_id: '024863981627'
      expected_head_sha: ${{ github.sha }}
      approval_confirmation: INGEST_REVIEWED_RAG_CORPUS
    secrets: inherit

  publish-backend:
    needs: ingest-v2
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: aws-backend-image-publish
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      EXPECTED_AWS_ACCOUNT_ID: ${{ vars.EXPECTED_AWS_ACCOUNT_ID }}
      BACKEND_ECR_REPOSITORY: ${{ vars.BACKEND_ECR_REPOSITORY || 'terraformers-backend' }}
      SOURCE_COMMIT_SHA: a672a322fcaa784baf19fa7bb0687fc403f0aff7

    steps:
      - name: Checkout instrumented backend source
        uses: actions/checkout@v5
        with:
          ref: ${{ env.SOURCE_COMMIT_SHA }}

      - name: Validate immutable publish inputs
        run: |
          set -euo pipefail
          test "$EXPECTED_AWS_ACCOUNT_ID" = '024863981627'
          test "$AWS_REGION" = 'ap-northeast-2'
          test -n "$AWS_ROLE_TO_ASSUME"
          [[ "$BACKEND_ECR_REPOSITORY" =~ ^[a-z0-9][a-z0-9._/-]*$ ]]
          IMAGE_TAG="git-${SOURCE_COMMIT_SHA}"
          IMAGE_URI="${EXPECTED_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${BACKEND_ECR_REPOSITORY}:${IMAGE_TAG}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: TerraformersRagV2BackendPublish
          aws-region: ${{ env.AWS_REGION }}
          allowed-account-ids: ${{ env.EXPECTED_AWS_ACCOUNT_ID }}

      - name: Verify repository and immutable tag availability
        run: |
          set -euo pipefail
          test "$(aws sts get-caller-identity --query Account --output text)" = "$EXPECTED_AWS_ACCOUNT_ID"
          aws ecr describe-repositories \
            --region "$AWS_REGION" \
            --repository-names "$BACKEND_ECR_REPOSITORY" \
            >/dev/null
          if aws ecr describe-images \
            --region "$AWS_REGION" \
            --repository-name "$BACKEND_ECR_REPOSITORY" \
            --image-ids imageTag="$IMAGE_TAG" \
            >/dev/null 2>&1; then
            echo "Immutable image tag already exists: $IMAGE_TAG" >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          set -euo pipefail
          docker build \
            --label "org.opencontainers.image.revision=${SOURCE_COMMIT_SHA}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            -f backend/Dockerfile \
            -t "$IMAGE_URI" \
            backend

      - name: Login and push immutable image
        run: |
          set -euo pipefail
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "${EXPECTED_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          docker push "$IMAGE_URI"
          IMAGE_DIGEST="$(aws ecr describe-images \
            --region "$AWS_REGION" \
            --repository-name "$BACKEND_ECR_REPOSITORY" \
            --image-ids imageTag="$IMAGE_TAG" \
            --query 'imageDetails[0].imageDigest' \
            --output text)"
          [[ "$IMAGE_DIGEST" == sha256:* ]]
          {
            echo "source_commit_sha=$SOURCE_COMMIT_SHA"
            echo "image_uri=$IMAGE_URI"
            echo "image_digest=$IMAGE_DIGEST"
            echo "corpus_version=terraformers-reference-v2"
            echo "provider_version=5.100.0"
            echo "pushed=true"
          } | tee backend-live-preparation-summary.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload sanitized publish evidence
        uses: actions/upload-artifact@v6
        with:
          name: rag-v2-backend-image-evidence
          path: backend-live-preparation-summary.txt
          if-no-files-found: error

  record-result:
    if: ${{ always() }}
    needs:
      - ingest-v2
      - publish-backend
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout preparation branch
        uses: actions/checkout@v5
        with:
          ref: agent/rag-corpus-version-scope
          fetch-depth: 0

      - name: Download ingestion evidence
        if: ${{ needs.ingest-v2.result == 'success' }}
        uses: actions/download-artifact@v6
        with:
          name: rag-corpus-ingestion-live-evidence
          path: preparation-evidence/ingestion

      - name: Download image evidence
        if: ${{ needs.publish-backend.result == 'success' }}
        uses: actions/download-artifact@v6
        with:
          name: rag-v2-backend-image-evidence
          path: preparation-evidence/image

      - name: Record sanitized preparation result
        env:
          INGEST_RESULT: ${{ needs.ingest-v2.result }}
          PUBLISH_RESULT: ${{ needs.publish-backend.result }}
        run: |
          set -euo pipefail
          RESULT_FILE=.github/rag-v2-live-preparation-result.txt
          {
            echo "workflow_commit_sha=${GITHUB_SHA}"
            echo "backend_source_commit_sha=a672a322fcaa784baf19fa7bb0687fc403f0aff7"
            echo "ingestion_result=${INGEST_RESULT}"
            echo "image_publish_result=${PUBLISH_RESULT}"
            if [[ -f preparation-evidence/ingestion/package-summary.txt ]]; then
              cat preparation-evidence/ingestion/package-summary.txt
            fi
            if [[ -f preparation-evidence/image/backend-live-preparation-summary.txt ]]; then
              cat preparation-evidence/image/backend-live-preparation-summary.txt
            fi
          } > "$RESULT_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$RESULT_FILE"
          git commit -m "Record RAG v2 live preparation result"
          git push origin HEAD:agent/rag-corpus-version-scope
