name: Backend Local Verification

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-local-verification:
    name: Backend local smoke baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify backend local baseline
        run: bash scripts/checks/backend-local-verification.sh

      - name: Upload backend verification diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-local-verification-diagnostics
          path: |
            backend/target/backend-local-verification-maven.log
            backend/target/surefire-reports

  mariadb-schema-validation:
    name: MariaDB schema and repository validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_DATABASE: terraformers
          MARIADB_USER: terraformers
          MARIADB_PASSWORD: terraformers
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      SPRING_DATASOURCE_URL: jdbc:mariadb://127.0.0.1:3306/terraformers
      SPRING_DATASOURCE_USERNAME: terraformers
      SPRING_DATASOURCE_PASSWORD: terraformers
      COGNITO_REGION: ap-northeast-2
      COGNITO_USER_POOL_ID: validation-pool
      COGNITO_USER_POOL_CLIENT_ID: validation-client
      COGNITO_JWKS_URL: http://127.0.0.1:65535/.well-known/jwks.json
      S3_BUCKET_NAME: validation-bucket
      SERVER_PORT: '18080'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Validate schema and canonical repository queries
        run: bash scripts/checks/mariadb-schema-validation.sh

      - name: Upload MariaDB validation diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mariadb-schema-validation-diagnostics
          path: |
            backend/target/mariadb-schema-validation.log
            backend/target/mariadb-repository-smoke.log
            backend/target/surefire-reports
