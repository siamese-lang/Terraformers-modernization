name: Backend Local Verification

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-local-verification:
    name: Backend local smoke baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify backend local baseline
        run: bash scripts/checks/backend-local-verification.sh
