name: S3 Writer Production Validation

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: Optional AWS region override. Defaults to repository/environment variable AWS_REGION, then ap-northeast-2.
        required: false
        default: ''
      upload_bucket:
        description: Existing S3 bucket that the validation may write to
        required: true
      upload_prefix:
        description: Object prefix for temporary validation uploads
        required: true
        default: terraformers-modernization-validation
      cleanup_object:
        description: Remove the validation object after head-object succeeds
        required: true
        type: boolean
        default: true
      aws_role_to_assume:
        description: Optional GitHub OIDC role ARN override. Defaults to repository/environment secret AWS_ROLE_TO_ASSUME.
        required: false
        default: ''

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ inputs.aws_region || vars.AWS_REGION || 'ap-northeast-2' }}
  AWS_ROLE_TO_ASSUME: ${{ inputs.aws_role_to_assume || secrets.AWS_ROLE_TO_ASSUME }}

jobs:
  s3-writer-production-validation:
    name: Validate S3 writer boundary
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Validate OIDC role configuration
        run: |
          set -euo pipefail
          if [[ -z "${AWS_ROLE_TO_ASSUME}" ]]; then
            echo "AWS_ROLE_TO_ASSUME repository/environment secret or aws_role_to_assume input is required." >&2
            exit 1
          fi

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: TerraformersS3WriterValidation
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS caller identity
        run: aws sts get-caller-identity --region "${AWS_REGION}"

      - name: Run S3 writer production validation
        env:
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
          S3_UPLOAD_BUCKET: ${{ inputs.upload_bucket }}
          S3_UPLOAD_PREFIX: ${{ inputs.upload_prefix }}
          CLEANUP_S3_OBJECT: ${{ inputs.cleanup_object }}
        run: bash scripts/checks/s3-writer-production-validation.sh

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s3-writer-production-validation
          path: artifacts/s3-writer-production-validation
