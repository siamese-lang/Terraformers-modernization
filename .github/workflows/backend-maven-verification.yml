name: Backend Maven Verification

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-maven-verification.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-maven-verification.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-maven-verification:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17 with Maven cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven test
        run: mvn -q test

      - name: Maven package without tests
        run: mvn -q -DskipTests package
