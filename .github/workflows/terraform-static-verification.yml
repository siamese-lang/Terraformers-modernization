name: Terraform Static Verification

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - agent/rdb-domain-realignment
    paths:
      - "infra/terraform/**"
      - "corpus/terraformers-reference/**"
      - "scripts/rag/**"
      - "tests/rag/**"
      - "scripts/checks/rag-corpus-contract-verification.py"
      - "scripts/checks/terraform-static-verification.sh"
      - "scripts/checks/approved-terraform-apply-contract-verification.py"
      - "scripts/deploy/verify-approved-terraform-apply-contract.py"
      - ".github/workflows/aws-live-terraform-apply.yml"
      - ".github/workflows/terraform-static-verification.yml"
      - "docs/**"

permissions:
  contents: read

jobs:
  terraform-static-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify RAG corpus tooling
        run: |
          set -euo pipefail
          python3 scripts/checks/rag-corpus-contract-verification.py
          python3 scripts/checks/rag-corpus-contract-verification.py \
            --corpus-dir corpus/terraformers-reference/v2
          python3 -m unittest \
            tests/rag/test_build_corpus_v2.py \
            tests/rag/test_curate_corpus_v2.py \
            tests/rag/test_ingest_corpus.py

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify deployment observability path
        run: |
          mvn -q -f backend/pom.xml \
            -Dtest=BedrockAnalysisProviderTest,BedrockPromptBuilderTest,OpenSearchKnnQueryBuilderTest,OpenSearchResponseParserTest,OpenSearchReferenceRetrieverTest \
            test

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false

      - name: Verify Terraform configurations
        run: bash scripts/checks/terraform-static-verification.sh

      - name: Upload Terraform static evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: terraform-static-verification-evidence
          path: artifacts/terraform-static-verification
          if-no-files-found: warn
