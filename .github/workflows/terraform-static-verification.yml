name: Terraform Static Verification

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/terraform-static-verification.yml"
      - "scripts/checks/terraform-static-verification.sh"
      - "infra/terraform/**"
      - "docs/terraform-*.md"

permissions:
  contents: read

jobs:
  terraform-static-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Verify Terraform configurations
        run: bash scripts/checks/terraform-static-verification.sh
