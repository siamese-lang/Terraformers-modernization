name: Terraform Static Verification

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "infra/terraform/**"
      - "scripts/checks/terraform-static-verification.sh"
      - ".github/workflows/terraform-static-verification.yml"
      - "docs/**"

permissions:
  contents: read

jobs:
  terraform-static-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Quiet checkout
        run: |
          git config --global advice.detachedHead false
          git init -q .
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git fetch -q --depth=1 origin "${GITHUB_REF}"
          git checkout -q FETCH_HEAD

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Diagnose network Terraform fmt
        run: terraform fmt -diff -check infra/terraform/envs/aws-runtime-network/main.tf

      - name: Verify Terraform configurations
        run: |
          bash scripts/checks/terraform-static-verification.sh > terraform-static.log 2>&1 || {
            tail -n 160 terraform-static.log
            exit 1
          }
          cat terraform-static.log
