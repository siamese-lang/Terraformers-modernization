name: AWS Live Terraform Apply

on:
  workflow_dispatch:
    inputs:
      execute_approved_apply:
        description: Must be true to mutate AWS through an approved apply contract.
        required: true
        type: boolean
        default: false
      expected_aws_account_id:
        description: AWS account ID that must match the OIDC caller identity.
        required: true
        type: string
      expected_head_sha:
        description: Commit SHA that must exactly match the checked-out GITHUB_SHA.
        required: true
        type: string
      apply_stage:
        description: Terraform environment to apply.
        required: true
        type: choice
        options:
          - foundation
          - eks-runtime
          - rag-runtime
        default: eks-runtime
      approved_resource_address:
        description: Reviewed eks-runtime resource address.
        required: false
        type: string
        default: aws_iam_policy.backend_runtime_access
      approved_changed_attribute_path:
        description: Reviewed eks-runtime attribute path.
        required: false
        type: string
        default: policy
      approval_confirmation:
        description: Type the stage-specific reviewed apply confirmation string.
        required: true
        type: string
  workflow_call:
    inputs:
      execute_approved_apply:
        required: true
        type: boolean
      expected_aws_account_id:
        required: true
        type: string
      expected_head_sha:
        required: true
        type: string
      apply_stage:
        required: true
        type: string
      approved_resource_address:
        required: false
        type: string
        default: aws_iam_policy.backend_runtime_access
      approved_changed_attribute_path:
        required: false
        type: string
        default: policy
      approval_confirmation:
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  TF_IN_AUTOMATION: 'true'
  TF_INPUT: 'false'

jobs:
  approved-live-terraform-apply:
    name: Apply reviewed Terraform contract
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ inputs.apply_stage == 'foundation' && 'aws-live-plan' || 'aws-live-apply' }}

    steps:
      - name: Validate apply inputs and resolve approved contract
        id: target
        env:
          EXECUTE_APPROVED_APPLY: ${{ inputs.execute_approved_apply }}
          APPLY_STAGE: ${{ inputs.apply_stage }}
          INPUT_APPROVAL_CONFIRMATION: ${{ inputs.approval_confirmation }}
          INPUT_APPROVED_RESOURCE_ADDRESS: ${{ inputs.approved_resource_address }}
          INPUT_APPROVED_CHANGED_ATTRIBUTE_PATH: ${{ inputs.approved_changed_attribute_path }}
          EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha }}
          EXPECTED_AWS_ACCOUNT_ID: ${{ inputs.expected_aws_account_id }}
          AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
          STATE_BUCKET: ${{ vars.AWS_TERRAFORM_STATE_BUCKET }}
          STATE_PREFIX: ${{ vars.AWS_TERRAFORM_STATE_PREFIX }}
          CALLER_WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          test "${EXECUTE_APPROVED_APPLY}" = true || { echo 'execute_approved_apply must be true for the approved apply path.' >&2; exit 1; }
          test -n "${EXPECTED_HEAD_SHA}" || { echo 'expected_head_sha is required.' >&2; exit 1; }
          test -n "${EXPECTED_AWS_ACCOUNT_ID}" || { echo 'expected_aws_account_id is required.' >&2; exit 1; }
          test -n "${AWS_ROLE_TO_ASSUME}" || { echo 'AWS_ROLE_TO_ASSUME environment variable is required.' >&2; exit 1; }
          test -n "${STATE_BUCKET}" || { echo 'AWS_TERRAFORM_STATE_BUCKET environment variable is required.' >&2; exit 1; }
          test -n "${STATE_PREFIX}" || { echo 'AWS_TERRAFORM_STATE_PREFIX environment variable is required.' >&2; exit 1; }
          case "${APPLY_STAGE}" in
            foundation)
              test "${GITHUB_EVENT_NAME}" = workflow_dispatch || {
                echo 'foundation apply requires workflow_dispatch.' >&2
                exit 1
              }
              [[ "${CALLER_WORKFLOW_REF}" == "${GITHUB_REPOSITORY}/.github/workflows/aws-live-terraform-apply.yml@"* ]] || {
                echo 'foundation apply must be dispatched directly from aws-live-terraform-apply.yml.' >&2
                exit 1
              }
              if [[ "${INPUT_APPROVAL_CONFIRMATION}" = APPLY_REVIEWED_FOUNDATION_CREATE ]]; then
                echo 'apply_contract=foundation-apply-role-bootstrap' >> "${GITHUB_OUTPUT}"
              elif [[ "${INPUT_APPROVAL_CONFIRMATION}" = APPLY_REVIEWED_RAG_APPLY_PERMISSION_CREATE ]]; then
                echo 'apply_contract=foundation-rag-apply-permission-create' >> "${GITHUB_OUTPUT}"
              elif [[ "${INPUT_APPROVAL_CONFIRMATION}" = APPLY_REVIEWED_RAG_APPLY_PERMISSION_UPDATE ]]; then
                echo 'apply_contract=foundation-rag-apply-permission-update' >> "${GITHUB_OUTPUT}"
              else
                echo 'approval_confirmation does not match a required foundation confirmation string.' >&2; exit 1
              fi
              echo 'tf_dir=infra/terraform/bootstrap/aws-live-foundation' >> "${GITHUB_OUTPUT}"
              echo 'state_component=bootstrap' >> "${GITHUB_OUTPUT}"
              echo 'tfvars_secret=AWS_LIVE_FOUNDATION_TFVARS_B64' >> "${GITHUB_OUTPUT}"
              ;;
            eks-runtime)
              test "${INPUT_APPROVAL_CONFIRMATION}" = APPLY_REVIEWED_IN_PLACE_UPDATE || { echo 'approval_confirmation does not match the required eks-runtime confirmation string.' >&2; exit 1; }
              test "${INPUT_APPROVED_RESOURCE_ADDRESS}" = aws_iam_policy.backend_runtime_access || { echo 'approved_resource_address does not match the reviewed resource.' >&2; exit 1; }
              test "${INPUT_APPROVED_CHANGED_ATTRIBUTE_PATH}" = policy || { echo 'approved_changed_attribute_path does not match the reviewed attribute path.' >&2; exit 1; }
              echo 'tf_dir=infra/terraform/envs/eks-runtime' >> "${GITHUB_OUTPUT}"
              echo 'state_component=eks-runtime' >> "${GITHUB_OUTPUT}"
              echo 'tfvars_secret=AWS_LIVE_EKS_TFVARS_B64' >> "${GITHUB_OUTPUT}"
              echo 'apply_contract=eks-runtime-backend-policy-update' >> "${GITHUB_OUTPUT}"
              ;;
            rag-runtime)
              if [[ "${INPUT_APPROVAL_CONFIRMATION}" = APPLY_REVIEWED_RAG_RUNTIME_CREATE ]]; then
                echo 'apply_contract=rag-runtime-reviewed-create' >> "${GITHUB_OUTPUT}"
              elif [[ "${INPUT_APPROVAL_CONFIRMATION}" = APPLY_REVIEWED_RAG_RUNTIME_RECOVERY ]]; then
                echo 'apply_contract=rag-runtime-reviewed-recovery' >> "${GITHUB_OUTPUT}"
              else
                echo 'approval_confirmation does not match a required rag-runtime confirmation string.' >&2; exit 1
              fi
              echo 'tf_dir=infra/terraform/envs/rag-runtime' >> "${GITHUB_OUTPUT}"
              echo 'state_component=rag-runtime' >> "${GITHUB_OUTPUT}"
              echo 'tfvars_secret=AWS_LIVE_RAG_TFVARS_B64' >> "${GITHUB_OUTPUT}"
              ;;
            *) echo 'apply_stage must be foundation, eks-runtime, or rag-runtime.' >&2; exit 1 ;;
          esac

      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify expected HEAD
        env:
          EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha }}
        run: test "${GITHUB_SHA}" = "${EXPECTED_HEAD_SHA}" || { echo "expected_head_sha does not match checked-out GITHUB_SHA (${GITHUB_SHA})." >&2; exit 1; }

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: TerraformersLiveApply
          aws-region: ${{ env.AWS_REGION }}
          allowed-account-ids: ${{ inputs.expected_aws_account_id }}

      - name: Verify AWS identity and state backend
        env:
          EXPECTED_AWS_ACCOUNT_ID: ${{ inputs.expected_aws_account_id }}
          STATE_BUCKET: ${{ vars.AWS_TERRAFORM_STATE_BUCKET }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/aws-live-terraform-apply
          test "$(aws sts get-caller-identity --query Account --output text)" = "${EXPECTED_AWS_ACCOUNT_ID}"
          aws s3api head-bucket --bucket "${STATE_BUCKET}"
          test "$(aws s3api get-bucket-versioning --bucket "${STATE_BUCKET}" --query Status --output text)" = Enabled

      - name: Restore private tfvars
        env:
          APPLY_STAGE: ${{ inputs.apply_stage }}
          FOUNDATION_TFVARS_B64: ${{ secrets.AWS_LIVE_FOUNDATION_TFVARS_B64 }}
          EKS_TFVARS_B64: ${{ secrets.AWS_LIVE_EKS_TFVARS_B64 }}
          RAG_TFVARS_B64: ${{ secrets.AWS_LIVE_RAG_TFVARS_B64 }}
        run: |
          set -euo pipefail
          case "${APPLY_STAGE}" in
            foundation)
              test -n "${FOUNDATION_TFVARS_B64}" || { echo 'AWS_LIVE_FOUNDATION_TFVARS_B64 secret is required.' >&2; exit 1; }
              TFVARS_B64="${FOUNDATION_TFVARS_B64}"
              ;;
            eks-runtime)
              test -n "${EKS_TFVARS_B64}" || { echo 'AWS_LIVE_EKS_TFVARS_B64 secret is required.' >&2; exit 1; }
              TFVARS_B64="${EKS_TFVARS_B64}"
              ;;
            rag-runtime)
              test -n "${RAG_TFVARS_B64}" || { echo 'AWS_LIVE_RAG_TFVARS_B64 secret is required.' >&2; exit 1; }
              TFVARS_B64="${RAG_TFVARS_B64}"
              ;;
          esac
          printf '%s' "${TFVARS_B64}" | base64 --decode > "${RUNNER_TEMP}/live.auto.tfvars"
          test -s "${RUNNER_TEMP}/live.auto.tfvars"
          sha256sum "${RUNNER_TEMP}/live.auto.tfvars" | awk '{print $1}' > artifacts/aws-live-terraform-apply/tfvars.sha256

      - name: Initialize remote state and create saved plan
        env:
          TF_DIR: ${{ steps.target.outputs.tf_dir }}
          STATE_COMPONENT: ${{ steps.target.outputs.state_component }}
          STATE_BUCKET: ${{ vars.AWS_TERRAFORM_STATE_BUCKET }}
          STATE_PREFIX: ${{ vars.AWS_TERRAFORM_STATE_PREFIX }}
        run: |
          set -euo pipefail
          if ! grep -R -E -q 'backend[[:space:]]+"s3"' "${TF_DIR}" --include='*.tf'; then
            cat > "${TF_DIR}/zz-live-backend.tf" <<'EOF'
          terraform {
            backend "s3" {}
          }
          EOF
          fi
          cat > "${RUNNER_TEMP}/backend.hcl" <<BACKEND_CONFIG
          bucket = "${STATE_BUCKET}"
          key = "${STATE_PREFIX}/${STATE_COMPONENT}/terraform.tfstate"
          region = "${AWS_REGION}"
          encrypt = true
          use_lockfile = true
          BACKEND_CONFIG
          terraform -chdir="${TF_DIR}" init -reconfigure -backend-config="${RUNNER_TEMP}/backend.hcl"
          terraform -chdir="${TF_DIR}" validate
          terraform -chdir="${TF_DIR}" plan -lock-timeout=5m -var-file="${RUNNER_TEMP}/live.auto.tfvars" -out="${RUNNER_TEMP}/live.tfplan" -no-color
          terraform -chdir="${TF_DIR}" show -json "${RUNNER_TEMP}/live.tfplan" > "${RUNNER_TEMP}/live-plan.json"
          terraform -chdir="${TF_DIR}" providers lock -platform=linux_amd64
          sha256sum "${RUNNER_TEMP}/live.tfplan" | awk '{print $1}' > artifacts/aws-live-terraform-apply/binary-plan.sha256

      - name: Enforce sanitized plan risk gate
        env:
          APPLY_STAGE: ${{ inputs.apply_stage }}
        run: python3 scripts/deploy/summarize-terraform-plan.py --plan-json "${RUNNER_TEMP}/live-plan.json" --output-dir artifacts/aws-live-terraform-apply --stage "${APPLY_STAGE}"

      - name: Verify exact approved apply contract
        env:
          APPLY_STAGE: ${{ inputs.apply_stage }}
          APPLY_CONTRACT: ${{ steps.target.outputs.apply_contract }}
          INPUT_APPROVED_RESOURCE_ADDRESS: ${{ inputs.approved_resource_address }}
          INPUT_APPROVED_CHANGED_ATTRIBUTE_PATH: ${{ inputs.approved_changed_attribute_path }}
        run: |
          set -euo pipefail
          args=(--summary-json artifacts/aws-live-terraform-apply/plan-risk-summary.json --summary-txt artifacts/aws-live-terraform-apply/plan-risk-summary.txt --contract "${APPLY_CONTRACT}" --stage "${APPLY_STAGE}")
          if [[ "${APPLY_STAGE}" = eks-runtime ]]; then args+=(--approved-resource "${INPUT_APPROVED_RESOURCE_ADDRESS}" --approved-changed-path "${INPUT_APPROVED_CHANGED_ATTRIBUTE_PATH}"); fi
          python3 scripts/deploy/verify-approved-terraform-apply-contract.py "${args[@]}"

      - name: Apply reviewed saved plan
        env:
          TF_DIR: ${{ steps.target.outputs.tf_dir }}
          APPLY_STAGE: ${{ inputs.apply_stage }}
          APPLY_CONTRACT: ${{ steps.target.outputs.apply_contract }}
        run: |
          set -euo pipefail
          terraform -chdir="${TF_DIR}" apply -no-color -auto-approve "${RUNNER_TEMP}/live.tfplan"
          {
            echo 'aws_live_terraform_apply=completed'
            echo "approved_contract=${APPLY_CONTRACT}"
            echo 'expected_account_id_verified=true'
            echo 'expected_head_verified=true'
            echo 'post_apply_full_plan=pending'
            echo 'terraform_destroy_executed=false'
            echo 'kubernetes_mutation_executed=false'
            echo 'raw_plan_uploaded=false'
            case "${APPLY_CONTRACT}" in
              foundation-rag-apply-permission-create)
                echo 'approved_action=create'
                echo 'approved_resource=aws_iam_role_policy.terraform_apply_rag_runtime_create'
                echo 'approved_resource_count=1'
                echo 'environment_gate=aws-live-plan'
                echo 'temporary_bootstrap_permission_cleanup=external-required'
                echo 'foundation_permission_extension=external-temporary-bootstrap-required'
                ;;
              foundation-rag-apply-permission-update)
                echo 'approved_action=update'
                echo 'approved_resource=aws_iam_role_policy.terraform_apply_rag_runtime_create'
                echo 'approved_changed_path=policy'
                echo 'approved_resource_count=1'
                echo 'environment_gate=aws-live-plan'
                echo 'temporary_bootstrap_permission_cleanup=external-required'
                echo 'foundation_permission_extension=external-temporary-bootstrap-required'
                ;;
              foundation-apply-role-bootstrap)
                echo 'approved_action=create'
                echo 'approved_resource_count=4'
                echo 'environment_gate=aws-live-plan'
                echo 'temporary_bootstrap_permission_cleanup=external-required'
                ;;
              rag-runtime-reviewed-create)
                echo 'approved_action=create-and-read'
                echo 'approved_resource_count=25'
                echo 'environment_gate=aws-live-apply'
                ;;
              rag-runtime-reviewed-recovery)
                echo 'approved_action=create-and-read'
                echo 'approved_resource_count=18'
                echo 'environment_gate=aws-live-apply'
                ;;
              eks-runtime-backend-policy-update)
                echo 'approved_resource=aws_iam_policy.backend_runtime_access'
                echo 'approved_action=update'
                echo 'approved_changed_path=policy'
                echo 'environment_gate=aws-live-apply'
                ;;
              *)
                echo "unknown apply contract: ${APPLY_CONTRACT}" >&2
                exit 1
                ;;
            esac
          } > artifacts/aws-live-terraform-apply/apply-summary.txt

      - name: Verify post-apply full plan has no changes
        env:
          TF_DIR: ${{ steps.target.outputs.tf_dir }}
        run: |
          set -euo pipefail
          POST_APPLY_PLAN="${RUNNER_TEMP}/post-apply-plan.txt"
          set +e; terraform -chdir="${TF_DIR}" plan -lock-timeout=5m -var-file="${RUNNER_TEMP}/live.auto.tfvars" -detailed-exitcode -no-color > "${POST_APPLY_PLAN}"; PLAN_EXIT=$?; set -e
          if [[ "${PLAN_EXIT}" -eq 0 ]]; then
            STATUS=no-changes
            STATUS_LINE='post_apply_full_plan=no-changes'
          else
            STATUS=verification-failed
            STATUS_LINE='post_apply_full_plan=verification-failed'
          fi
          sed -i "s/post_apply_full_plan=pending/${STATUS_LINE}/" artifacts/aws-live-terraform-apply/apply-summary.txt
          printf '%s\npost_apply_plan_exit_code=%s\n' "${STATUS_LINE}" "${PLAN_EXIT}" > artifacts/aws-live-terraform-apply/post-apply-status.txt
          test "${PLAN_EXIT}" -eq 0

      - name: Remove sensitive apply material
        if: always()
        run: rm -f "${RUNNER_TEMP}/live-plan.json" "${RUNNER_TEMP}/live.tfplan" "${RUNNER_TEMP}/live.auto.tfvars" "${RUNNER_TEMP}/backend.hcl" "${RUNNER_TEMP}/post-apply-plan.txt"

      - name: Upload sanitized apply evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: aws-live-terraform-apply-${{ inputs.apply_stage }}-evidence
          path: artifacts/aws-live-terraform-apply
          if-no-files-found: warn
          retention-days: 30
