name: Live Deployment Plan Contract Verification

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - agent/rdb-domain-realignment
    paths:
      - ".github/workflows/aws-live-terraform-plan.yml"
      - ".github/workflows/runtime-contract-verification.yml"
      - ".github/workflows/live-deployment-plan-contract-verification.yml"
      - "config/live-deployment-stages.json"
      - "scripts/deploy/build-live-deployment-execution-plan.py"
      - "scripts/deploy/summarize-terraform-plan.py"
      - "scripts/deploy/verify-approved-terraform-apply-contract.py"
      - "scripts/checks/approved-terraform-apply-contract-verification.py"
      - ".github/workflows/aws-live-terraform-apply.yml"
      - "scripts/checks/live-deployment-plan-contract-verification.sh"
      - "scripts/checks/terraform-plan-changed-paths-verification.py"
      - "scripts/checks/premerge-live-plan-dispatch-verification.sh"
      - "docs/live-aws-deployment-execution-plan.md"
      - "docs/premerge-live-plan-dispatch.md"

permissions:
  contents: read

jobs:
  live-deployment-plan-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: >-
            -color
            -shellcheck=
            -pyflakes=
            .github/workflows/aws-live-terraform-plan.yml
            .github/workflows/aws-live-terraform-apply.yml
            .github/workflows/live-deployment-plan-contract-verification.yml

      - name: Verify live deployment plan contract
        run: bash scripts/checks/live-deployment-plan-contract-verification.sh

      - name: Verify sanitized Terraform update paths
        run: python3 scripts/checks/terraform-plan-changed-paths-verification.py

      - name: Verify approved Terraform apply contract
        run: python3 scripts/checks/approved-terraform-apply-contract-verification.py

      - name: Verify pre-merge dispatch entry
        run: bash scripts/checks/premerge-live-plan-dispatch-verification.sh

      - name: Upload live deployment plan contract evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-deployment-plan-contract-evidence
          path: artifacts/live-deployment-plan-contract
          if-no-files-found: warn
