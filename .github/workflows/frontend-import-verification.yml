name: Frontend Import Verification

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-import-verification:
    name: Frontend import build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Verify selected frontend import
        run: bash scripts/checks/frontend-import-verification.sh
