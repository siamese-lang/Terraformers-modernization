name: Backend Image Build Verification

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-image-build.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-image-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-image-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t terraformers-backend:ci backend
