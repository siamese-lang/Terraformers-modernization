name: Backend Image Publish

on:
  workflow_dispatch:
    inputs:
      image_uri:
        description: Full image URI. Push mode requires the immutable git-<full-commit-sha> tag.
        required: true
        default: terraformers-backend:manual
      push_image:
        description: Push image after build. Keep false for build-only verification.
        required: true
        type: boolean
        default: false
      create_gitops_update_pr:
        description: Create a digest-only GitOps manifest update pull request after a successful image push.
        required: true
        type: boolean
        default: false
permissions:
  contents: read
  id-token: write

jobs:
  backend-image-publish:
    name: Build and optionally publish backend image
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: aws-backend-image-publish
    outputs:
      repository_uri: ${{ steps.push.outputs.repository_uri }}
      image_tag: ${{ steps.push.outputs.image_tag }}
      image_digest: ${{ steps.push.outputs.image_digest }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      EXPECTED_AWS_ACCOUNT_ID: ${{ vars.EXPECTED_AWS_ACCOUNT_ID }}
      SOURCE_COMMIT_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate publish contract
        if: ${{ inputs.push_image || inputs.create_gitops_update_pr }}
        run: |
          set -euo pipefail
          if [[ "${{ inputs.create_gitops_update_pr }}" == "true" ]]; then
            if [[ "${{ inputs.push_image }}" != "true" ]]; then
              echo "create_gitops_update_pr=true requires push_image=true." >&2
              exit 1
            fi
            if [[ "${GITHUB_REF_TYPE}" != "branch" || "${GITHUB_REF_NAME}" != "agent/rdb-domain-realignment" ]]; then
              echo "GitOps update PRs must run from agent/rdb-domain-realignment." >&2
              exit 1
            fi
          fi
          for variable_name in AWS_ROLE_TO_ASSUME AWS_REGION EXPECTED_AWS_ACCOUNT_ID; do
            if [[ -z "${!variable_name}" ]]; then
              echo "${variable_name} Environment or repository variable is required when push_image=true." >&2
              exit 1
            fi
          done
          if [[ "${{ inputs.image_uri }}" != *":git-${SOURCE_COMMIT_SHA}" ]]; then
            echo "Push mode requires image tag git-${SOURCE_COMMIT_SHA}." >&2
            exit 1
          fi
          if [[ "${{ inputs.image_uri }}" != *.dkr.ecr."${AWS_REGION}".amazonaws.com/* ]]; then
            echo "image_uri must identify an ECR repository in ${AWS_REGION}." >&2
            exit 1
          fi

      - name: Configure AWS credentials through OIDC
        if: ${{ inputs.push_image }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: TerraformersBackendImagePublish
          aws-region: ${{ env.AWS_REGION }}
          allowed-account-ids: ${{ env.EXPECTED_AWS_ACCOUNT_ID }}

      - name: Verify AWS account and immutable tag availability
        if: ${{ inputs.push_image }}
        env:
          IMAGE_URI: ${{ inputs.image_uri }}
        run: |
          set -euo pipefail
          actual_account_id="$(aws sts get-caller-identity --query Account --output text --region "${AWS_REGION}")"
          test "${actual_account_id}" = "${EXPECTED_AWS_ACCOUNT_ID}"
          echo "aws_account_match=true"
          repository_uri="${IMAGE_URI%:*}"
          repository_name="${repository_uri##*/}"
          image_tag="${IMAGE_URI##*:}"
          if aws ecr describe-images --region "${AWS_REGION}" --repository-name "${repository_name}" --image-ids imageTag="${image_tag}" >/dev/null 2>&1; then
            echo "Immutable image tag already exists; refusing overwrite: ${image_tag}" >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        env:
          IMAGE_URI: ${{ inputs.image_uri }}
        run: |
          set -euo pipefail
          docker build --build-arg "BUILD_SOURCE_REVISION=${SOURCE_COMMIT_SHA}" --label "org.opencontainers.image.revision=${SOURCE_COMMIT_SHA}" --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" -f backend/Dockerfile -t "${IMAGE_URI}" backend
          docker image inspect "${IMAGE_URI}" > backend-image-inspect.json

      - name: Login to ECR
        if: ${{ inputs.push_image }}
        env:
          IMAGE_URI: ${{ inputs.image_uri }}
        run: |
          set -euo pipefail
          aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${IMAGE_URI%%/*}"

      - name: Push backend image and resolve digest
        id: push
        if: ${{ inputs.push_image }}
        env:
          IMAGE_URI: ${{ inputs.image_uri }}
        run: |
          set -euo pipefail
          docker push "${IMAGE_URI}"
          repository_uri="${IMAGE_URI%:*}"
          repository_name="${repository_uri##*/}"
          image_tag="${IMAGE_URI##*:}"
          image_digest="$(aws ecr describe-images --region "${AWS_REGION}" --repository-name "${repository_name}" --image-ids imageTag="${image_tag}" --query 'imageDetails[0].imageDigest' --output text)"
          [[ "${image_digest}" == sha256:* ]] || { echo "Unable to resolve pushed ECR image digest." >&2; exit 1; }
          echo "repository_uri=${repository_uri}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "image_digest=${image_digest}" >> "${GITHUB_OUTPUT}"
          printf 'source_commit=%s\nimage_tag=%s\necr_digest=%s\n' "${SOURCE_COMMIT_SHA}" "${image_tag}" "${image_digest}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Record build-only image summary
        if: ${{ !inputs.push_image }}
        env:
          IMAGE_URI: ${{ inputs.image_uri }}
        run: |
          set -euo pipefail
          printf 'source_commit=%s\nimage_uri=%s\npushed=false\ncredential_mode=not-configured\n' "${SOURCE_COMMIT_SHA}" "${IMAGE_URI}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload image build evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-image-publish-evidence
          path: backend-image-inspect.json

  create-gitops-update-pr:
    name: Create GitOps digest update pull request
    needs: backend-image-publish
    if: ${{ inputs.push_image && inputs.create_gitops_update_pr }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      SOURCE_COMMIT_SHA: ${{ github.sha }}
      REPOSITORY_URI: ${{ needs.backend-image-publish.outputs.repository_uri }}
      IMAGE_TAG: ${{ needs.backend-image-publish.outputs.image_tag }}
      IMAGE_DIGEST: ${{ needs.backend-image-publish.outputs.image_digest }}
      BASE_BRANCH: agent/rdb-domain-realignment
    steps:
      - name: Checkout GitOps base revision
        uses: actions/checkout@v4
        with:
          ref: agent/rdb-domain-realignment
          token: ${{ github.token }}

      - name: Set up pinned kubectl for offline Kustomize rendering
        uses: azure/setup-kubectl@v5
        with:
          version: v1.30.5

      - name: Update digest-only GitOps manifest and validate render
        id: update
        run: |
          set -euo pipefail
          [[ "${IMAGE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]] || { echo "Resolved ECR digest is invalid." >&2; exit 1; }
          branch="gitops/backend-${IMAGE_DIGEST#sha256:}"
          echo "branch=${branch}" >> "${GITHUB_OUTPUT}"
          if git ls-remote --exit-code --heads origin "${branch}" >/dev/null; then
            echo "release_branch_pushed=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          git switch -c "${branch}"
          manifest=infra/kubernetes/gitops/backend-runtime/kustomization.yaml
          python3 -c 'import re, sys; path, repository, digest = sys.argv[1:]; text = open(path).read(); text, names = re.subn(r"(?m)^(    newName: ).*$", r"\g<1>" + repository, text); text, digests = re.subn(r"(?m)^(    digest: )sha256:[0-9a-f]{64}$", r"\g<1>" + digest, text); (names == 1 and digests == 1 and "newTag:" not in text) or sys.exit("GitOps image replacement must change exactly newName and digest, with no tag."); open(path, "w").write(text)' "${manifest}" "${REPOSITORY_URI}" "${IMAGE_DIGEST}"
          rendered="$(kubectl kustomize infra/kubernetes/gitops/backend-runtime)"
          expected_image="${REPOSITORY_URI}@${IMAGE_DIGEST}"
          awk -v expected_image="${expected_image}" '
            $1 == "image:" && $2 == expected_image && NF == 2 { found = 1 }
            END { exit(found ? 0 : 1) }
          ' <<<"${rendered}" || { echo "Rendered Deployment image is not repository@sha256 digest." >&2; exit 1; }
          git diff --check
          git add "${manifest}"
          if git diff --cached --quiet; then
            echo "manifest_unchanged=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m "chore(gitops): deploy backend ${IMAGE_DIGEST:7:12}"
          git push origin "${branch}"
          echo "manifest_unchanged=false" >> "${GITHUB_OUTPUT}"
          echo "release_branch_pushed=true" >> "${GITHUB_OUTPUT}"

      - name: Create or report GitOps update pull request
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.update.outputs.branch }}
          MANIFEST_UNCHANGED: ${{ steps.update.outputs.manifest_unchanged }}
          RELEASE_BRANCH_PUSHED: ${{ steps.update.outputs.release_branch_pushed }}
        run: |
          set -euo pipefail
          existing_pr="$(gh pr list --base "${BASE_BRANCH}" --head "${BRANCH}" --state all --json url,state --jq '.[0] | if . == null then "" else "\(.url) \(.state)" end')"
          if [[ -n "${existing_pr}" ]]; then
            pr_url="${existing_pr% *}"
            pr_state="${existing_pr##* }"
            echo "Existing digest release PR (${pr_state}): ${pr_url}"
          elif [[ "${MANIFEST_UNCHANGED}" == "true" ]]; then
            pr_url="none"
            pr_state="ALREADY_CURRENT"
            echo "GitOps manifest already contains ${IMAGE_DIGEST}."
          else
            [[ "${RELEASE_BRANCH_PUSHED}" == "true" ]] || { echo "Release branch was not pushed; refusing to create a PR." >&2; exit 1; }
            pr_url="$(gh pr create --base "${BASE_BRANCH}" --head "${BRANCH}" --title "chore(gitops): deploy backend ${IMAGE_DIGEST:7:12}" --body "Automated immutable-digest Backend GitOps update.\n\nSource commit: ${SOURCE_COMMIT_SHA}\nImage tag: ${IMAGE_TAG}\nECR digest: ${REPOSITORY_URI}@${IMAGE_DIGEST}")"
            pr_state="OPEN"
          fi
          printf 'source_commit=%s\nimage_tag=%s\necr_digest=%s\ngitops_branch=%s\npr_url=%s\npr_state=%s\n' "${SOURCE_COMMIT_SHA}" "${IMAGE_TAG}" "${IMAGE_DIGEST}" "${BRANCH}" "${pr_url}" "${pr_state}" >> "${GITHUB_STEP_SUMMARY}"
