name: Backend Image Publish

on:
  workflow_dispatch:
    inputs:
      image_uri:
        description: Full image URI to tag. Use an ECR URI when push_image=true.
        required: true
        default: terraformers-backend:manual
      push_image:
        description: Push image after build. Keep false for build-only verification.
        required: true
        type: boolean
        default: false
      aws_region:
        description: Optional AWS region override. Defaults to repository/environment variable AWS_REGION, then ap-northeast-2.
        required: false
        default: ''
      aws_role_to_assume:
        description: Optional GitHub OIDC role ARN override. Defaults to repository/environment secret AWS_ROLE_TO_ASSUME.
        required: false
        default: ''

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ inputs.aws_region || vars.AWS_REGION || 'ap-northeast-2' }}
  AWS_ROLE_TO_ASSUME: ${{ inputs.aws_role_to_assume || secrets.AWS_ROLE_TO_ASSUME }}

jobs:
  backend-image-publish:
    name: Build and optionally publish backend image
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          set -euo pipefail
          docker build -f backend/Dockerfile -t "${{ inputs.image_uri }}" backend
          docker image inspect "${{ inputs.image_uri }}" > backend-image-inspect.json

      - name: Validate OIDC role configuration
        if: ${{ inputs.push_image }}
        run: |
          set -euo pipefail
          if [[ -z "${AWS_ROLE_TO_ASSUME}" ]]; then
            echo "AWS_ROLE_TO_ASSUME repository/environment secret or aws_role_to_assume input is required when push_image=true." >&2
            exit 1
          fi

      - name: Configure AWS credentials through OIDC
        if: ${{ inputs.push_image }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: TerraformersBackendImagePublish
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS caller identity
        if: ${{ inputs.push_image }}
        run: aws sts get-caller-identity --region "${AWS_REGION}"

      - name: Login to ECR
        if: ${{ inputs.push_image }}
        run: |
          set -euo pipefail
          ECR_REGISTRY="$(echo "${{ inputs.image_uri }}" | cut -d/ -f1)"
          if [[ "${ECR_REGISTRY}" != *.amazonaws.com ]]; then
            echo "image_uri must be an ECR URI when push_image=true: ${{ inputs.image_uri }}" >&2
            exit 1
          fi
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

      - name: Push backend image
        if: ${{ inputs.push_image }}
        run: |
          set -euo pipefail
          docker push "${{ inputs.image_uri }}"
          {
            echo "image_uri=${{ inputs.image_uri }}"
            echo "pushed=true"
            echo "aws_region=${AWS_REGION}"
            echo "credential_mode=github-oidc"
            echo "pushed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > backend-image-publish-summary.txt

      - name: Record build-only image summary
        if: ${{ !inputs.push_image }}
        run: |
          set -euo pipefail
          {
            echo "image_uri=${{ inputs.image_uri }}"
            echo "pushed=false"
            echo "credential_mode=not-configured"
            echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > backend-image-publish-summary.txt

      - name: Upload image build evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-image-publish-evidence
          path: |
            backend-image-inspect.json
            backend-image-publish-summary.txt
