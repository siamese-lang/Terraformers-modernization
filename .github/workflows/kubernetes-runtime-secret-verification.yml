name: Kubernetes Runtime Secret Verification

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  kubernetes-runtime-secret-verification:
    name: Runtime Secret dry-run verification
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Verify runtime Secret render path
        run: bash scripts/checks/kubernetes-runtime-secret-verification.sh

      - name: Upload runtime Secret evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kubernetes-runtime-secret-evidence
          path: artifacts/kubernetes-runtime-secret
          if-no-files-found: ignore
