spring:
  application:
    name: terraformers-backend-modernization
  autoconfigure:
    exclude: []
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.MariaDBDialect
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

terraformers:
  runtime:
    required-env:
      - SPRING_DATASOURCE_URL
      - SPRING_DATASOURCE_USERNAME
      - SPRING_DATASOURCE_PASSWORD
      - COGNITO_REGION
      - COGNITO_USER_POOL_ID
      - COGNITO_USER_POOL_CLIENT_ID
      - COGNITO_JWKS_URL
      - S3_BUCKET_NAME
  security:
    jwt:
      enabled: true
      issuer-uri: https://cognito-idp.${COGNITO_REGION}.amazonaws.com/${COGNITO_USER_POOL_ID}
      jwk-set-uri: ${COGNITO_JWKS_URL}
      client-id: ${COGNITO_USER_POOL_CLIENT_ID}
  upload:
    source-bucket: ${S3_BUCKET_NAME}
    source-prefix: browser-uploads
  storage:
    s3-reader-enabled: ${S3_READER_ENABLED:false}
    s3-writer-enabled: ${S3_WRITER_ENABLED:false}
  analysis:
    mode: integrated-java
    bedrock-provider-enabled: ${BEDROCK_PROVIDER_ENABLED:false}
    bedrock-embedding-enabled: ${BEDROCK_EMBEDDING_ENABLED:false}
    bedrock-model-id: ${BEDROCK_MODEL_ID:}
    bedrock-embedding-model-id: ${BEDROCK_EMBEDDING_MODEL_ID:}
    bedrock-max-tokens: ${BEDROCK_MAX_TOKENS:4096}
    opensearch-retriever-enabled: ${OPENSEARCH_RETRIEVER_ENABLED:false}
    opensearch-endpoint: ${OPENSEARCH_ENDPOINT:}
    opensearch-service-name: ${OPENSEARCH_SERVICE_NAME:aoss}
    opensearch-top-k: ${OPENSEARCH_TOP_K:3}
    index-name: ${INDEX_NAME:}
    vector-field-name: ${VECTOR_FIELD_NAME:}
    content-field-name: ${CONTENT_FIELD_NAME:}
    result-bucket-name: ${ANALYSIS_RESULT_BUCKET_NAME:${S3_BUCKET_NAME}}
    result-key-prefix: ${ANALYSIS_RESULT_KEY_PREFIX:analysis-results}
    external-python-service-url: ${PYTHON_ANALYSIS_SERVICE_URL:}
    sqs-publisher-enabled: ${ANALYSIS_SQS_PUBLISHER_ENABLED:false}
    progress-queue-url: ${AI_LOG_QUEUE_URL:}
    result-queue-url: ${TERRAFORM_LOG_QUEUE_URL:}
